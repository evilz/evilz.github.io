site:
  name: Evilz blog
  site: 'https://www.evilznet.com'
  base: '/'
  trailingSlash: true
  googleSiteVerificationId: false

metadata:
  title:
    default: Evilz blog
    template: '%s | Evilz blog'
  description: 'Code for Human'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Evilz blog
    images:
      - url: '/generated-covers/site-default.svg'
        width: 1200
        height: 675
    type: website
  twitter:
    handle: '@Evilznet'
    site: '@Evilznet'
    cardType: summary_large_image

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 8

    post:
      isEnabled: true
      permalink: '/%year%/%month%/%day%/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
